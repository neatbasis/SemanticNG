name: Precommit Learning Loop Weekly

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  aggregate-precommit-failures:
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Aggregate last 7 days of pre-commit failures
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/aggregate_precommit_failure_learning.py \
            --lookback-days 7 \
            --json-out weekly_precommit_failure_summary.json \
            --md-out weekly_precommit_failure_summary.md
          cat weekly_precommit_failure_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload weekly learning-loop artifact
        uses: actions/upload-artifact@v7
        with:
          name: weekly-precommit-learning-loop
          path: |
            weekly_precommit_failure_summary.json
            weekly_precommit_failure_summary.md
          if-no-files-found: warn
