name: Quality Guardrails

# Pyproject-to-CI quality gate mapping
#
# | pyproject.toml section | Canonical command (Makefile) | Notes |
# | --- | --- | --- |
# | [tool.pytest.ini_options] | make qa-test-cov | Test discovery/runtime flags and marker/filter behavior apply to the test-cov job. |
# | [tool.coverage.run], [tool.coverage.report] | make qa-test-cov | Coverage configuration (including fail_under) is enforced by pytest-cov in test-cov. |
# | [tool.mypy] (Tier 1 strict scope) | make qa-hook-parity | mypy hook is scoped to strict core/application paths for fast local feedback. |
# | [tool.mypy] (full surface) | make qa-full-type-surface | Separate CI gate for tests + legacy/BDD namespaces under bounded relaxations. |
# | [tool.ruff], [tool.black], [tool.isort], other lint tooling sections | make qa-hook-parity | Lint/format policy is enforced through configured pre-commit hooks. |
# | Combined CI-equivalent command pack | make qa-ci-equivalent | Runs no-regression budget + hook parity + test coverage + full type surface in canonical order. |

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

jobs:
  no-regression-budget:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Shared Python setup
        uses: ./.github/actions/python-test-setup

      - name: Enforce no-regression budget policy
        run: python .github/scripts/check_no_regression_budget.py

  baseline-lint-type:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Shared Python setup
        uses: ./.github/actions/python-test-setup

      - name: Run hook parity gate (verbose, capture log)
        id: hook_parity
        continue-on-error: true
        run: |
          set -o pipefail
          make qa-hook-parity 2>&1 | tee precommit.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Show pre-commit log
        if: always()
        run: |
          echo "===== precommit.log ====="
          sed -n '1,200p' precommit.log || true
          echo "===== (end) ====="
      - name: Classify pre-commit output
        if: always()
        run: |
          python .github/scripts/classify_precommit_failures.py \
            --log precommit.log \
            --json-out precommit_failure_classification.json \
            --md-out precommit_failure_classification.md
          cat precommit_failure_classification.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload pre-commit log artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: precommit-log
          path: precommit.log
          if-no-files-found: warn

      - name: Upload pre-commit classification artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: precommit-classification
          path: |
            precommit_failure_classification.json
            precommit_failure_classification.md
          if-no-files-found: warn

      - name: Fail job on hook parity errors
        if: steps.hook_parity.outcome == 'failure'
        run: exit 1

  baseline-test-cov:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Shared Python setup
        uses: ./.github/actions/python-test-setup

      - name: Run tests with coverage gate
        run: make qa-test-cov

  full-type-surface:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Shared Python setup
        uses: ./.github/actions/python-test-setup

      - name: Run mypy (full type surface)
        run: make qa-full-type-surface
