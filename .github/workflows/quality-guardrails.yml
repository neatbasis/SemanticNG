name: Quality Guardrails

# Pyproject-to-CI quality gate mapping
#
# | pyproject.toml section | Canonical command (Makefile) | Notes |
# | --- | --- | --- |
# | [tool.pytest.ini_options] | make qa-test-cov | Test discovery/runtime flags and marker/filter behavior apply to the test-cov job. |
# | [tool.coverage.run], [tool.coverage.report] | make qa-test-cov | Coverage configuration (including fail_under) is enforced by pytest-cov in test-cov. |
# | [tool.mypy] (Tier 1 strict scope) | make qa-hook-parity | mypy hook is scoped to strict core/application paths for fast local feedback. |
# | [tool.mypy] (full surface) | make qa-full-type-surface | Separate CI gate for tests + legacy/BDD namespaces under bounded relaxations. |
# | [tool.ruff], [tool.black], [tool.isort], other lint tooling sections | make qa-hook-parity | Lint/format policy is enforced through configured pre-commit hooks. |
# | Combined CI-equivalent command pack | make qa-ci | Runs no-regression budget + hook parity + test coverage + full type surface in canonical order. |

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

jobs:
  no-regression-budget:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Shared Python setup
        uses: ./.github/actions/python-test-setup

      - name: Run `python .github/scripts/validate_no_regression_budget_update.py`
        env:
          HEAD_SHA: ${{ github.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before }}
        run: python .github/scripts/validate_no_regression_budget_update.py

      - name: Run `python .github/scripts/check_no_regression_budget.py`
        run: python .github/scripts/check_no_regression_budget.py

  baseline-lint-type:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Shared Python setup
        uses: ./.github/actions/python-test-setup

      - name: Verify toolchain parity sync
        run: python scripts/ci/check_toolchain_parity.py

      # Failing job command (verbatim): make qa-baseline
      - name: Run `make qa-baseline` (capture concise console + full artifact log)
        id: hook_parity
        continue-on-error: true
        run: |
          set -o pipefail
          make qa-baseline 2>&1 | tee precommit.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Show concise grouped pre-commit log excerpt
        if: always()
        run: |
          echo "::group::precommit.log (head)"
          sed -n '1,80p' precommit.log || true
          echo "::endgroup::"
          echo "::group::precommit.log (tail)"
          tail -n 120 precommit.log || true
          echo "::endgroup::"

      - name: Classify pre-commit output
        if: always()
        run: |
          python .github/scripts/classify_precommit_failures.py \
            --log precommit.log \
            --json-out precommit_failure_classification.json \
            --md-out precommit_failure_classification.md
          cat precommit_failure_classification.md >> "$GITHUB_STEP_SUMMARY"

      - name: Detect pre-commit autofix working-tree changes
        if: always()
        id: precommit_dirty
        run: |
          set -euo pipefail

          status_file="precommit_status.txt"
          git status --porcelain > "$status_file"
          changed_file_count="$(wc -l < "$status_file" | tr -d '[:space:]')"
          echo "changed_file_count=$changed_file_count" >> "$GITHUB_OUTPUT"

          if [[ -s "$status_file" ]]; then
            echo "dirty=true" >> "$GITHUB_OUTPUT"
            {
              echo "### Hook parity left uncommitted changes"
              echo
              echo "Run \`pre-commit run --all-files\` locally and commit the resulting changes before pushing."
              echo
              echo "Changed file count: $changed_file_count"
              echo
              echo "Touched paths:"
              sed 's/^/- `/' "$status_file" | sed 's/$/`/'
            } >> "$GITHUB_STEP_SUMMARY"

            git --no-pager diff > precommit_autofix.patch
          else
            echo "dirty=false" >> "$GITHUB_OUTPUT"
            echo "No working-tree changes detected after hook parity." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build baseline-lint-type quality summary artifact
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          data = {}
          class_path = Path("precommit_failure_classification.json")
          if class_path.exists():
            data = json.loads(class_path.read_text(encoding="utf-8"))

          hooks = data.get("failing_hooks", [])
          classes = data.get("classes_detected", [])
          first_files = []
          for hook in hooks:
            for file_path in hook.get("files", []):
              if file_path not in first_files:
                first_files.append(file_path)
              if len(first_files) >= 8:
                break
            if len(first_files) >= 8:
              break

          lines = [
            "# Quality summary (baseline-lint-type)",
            "",
            f"- Failed command: `make qa-baseline`",
            f"- Top error classes: `{', '.join(classes[:5]) if classes else 'none detected'}`",
            f"- First failing files: `{', '.join(first_files[:5]) if first_files else 'none detected'}`",
            "",
            "## Local remediation",
            "- `pre-commit run --all-files`",
            "- `mypy --config-file=pyproject.toml src tests`",
            "",
            "## Artifacts",
            "- `precommit-log`",
            "- `precommit-classification`",
            "- `precommit-autofix-patch`",
          ]
          Path("quality-summary.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          cat quality-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload pre-commit autofix patch artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: precommit-autofix-patch
          path: precommit_autofix.patch
          if-no-files-found: warn

      - name: Upload pre-commit log artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: precommit-log
          path: precommit.log
          if-no-files-found: warn

      - name: Upload pre-commit classification artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: precommit-classification
          path: |
            precommit_failure_classification.json
            precommit_failure_classification.md
          if-no-files-found: warn

      - name: Upload baseline-lint-type quality summary artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-summary-baseline-lint-type
          path: quality-summary.md
          if-no-files-found: warn

      - name: Add pre-commit remediation summary
        if: always()
        run: |
          set -euo pipefail

          failing_hooks="$(python -c '
          import json
          from pathlib import Path

          path = Path("precommit_failure_classification.json")
          if not path.exists():
              print("none detected (classification artifact missing)")
          else:
              data = json.loads(path.read_text(encoding="utf-8"))
              names = [item.get("name", "").strip() for item in data.get("failing_hooks", []) if item.get("name")]
              print(", ".join(names) if names else "none detected")
          '
          )"

          changed_count="${{ steps.precommit_dirty.outputs.changed_file_count || '0' }}"

          {
            echo
            echo "### Pre-commit remediation summary"
            echo
            echo "- Failing hooks: $failing_hooks"
            echo "- Changed files: $changed_count"
            echo "- Local fix command: \`pre-commit run --all-files\`"
            echo "- Local type-check command: \`mypy --config-file=pyproject.toml src tests\`"
            echo "- Quality summary artifact: \`quality-summary-baseline-lint-type\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Final end-of-job failure summary
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          failed = []
          if "${{ steps.hook_parity.outputs.exit_code || '0' }}" != "0":
            failed.append("make qa-baseline")
          if "${{ steps.precommit_dirty.outputs.dirty || 'false' }}" == "true":
            failed.append("pre-commit run --all-files (autofix drift)")

          data = {}
          path = Path("precommit_failure_classification.json")
          if path.exists():
            data = json.loads(path.read_text(encoding="utf-8"))

          classes = data.get("classes_detected", [])
          files = []
          for hook in data.get("failing_hooks", []):
            for file_path in hook.get("files", []):
              if file_path not in files:
                files.append(file_path)
              if len(files) >= 5:
                break
            if len(files) >= 5:
              break

          print("\n### End-of-job summary (baseline-lint-type)")
          print(f"- Failed command(s): `{', '.join(failed) if failed else 'none'}`")
          print(f"- Top error classes: `{', '.join(classes[:5]) if classes else 'none detected'}`")
          print(f"- First failing files: `{', '.join(files) if files else 'none detected'}`")
          PY

      - name: Fail job on pre-commit autofix changes
        if: always() && steps.precommit_dirty.outputs.dirty == 'true'
        run: exit 1

      - name: Fail job on hook parity errors
        if: steps.hook_parity.outcome == 'failure'
        run: exit 1

  baseline-test-cov:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Shared Python setup
        uses: ./.github/actions/python-test-setup

      - name: Run `make qa-test-cov`
        run: make qa-test-cov

  full-type-surface:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Shared Python setup
        uses: ./.github/actions/python-test-setup

      - name: Run `pre-commit run --all-files`
        run: pre-commit run --all-files

      # Failing job command (verbatim): make qa-full-type
      - name: Run `make qa-full-type` (capture concise console + full artifact log)
        id: full_type
        continue-on-error: true
        run: |
          set -o pipefail
          make qa-full-type 2>&1 | tee full_type.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Show concise grouped mypy log excerpt
        if: always()
        run: |
          echo "::group::full_type.log (head)"
          sed -n '1,80p' full_type.log || true
          echo "::endgroup::"
          echo "::group::full_type.log (tail)"
          tail -n 120 full_type.log || true
          echo "::endgroup::"

      - name: Build full-type quality summary artifact
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          from pathlib import Path

          log_text = Path("full_type.log").read_text(encoding="utf-8", errors="replace") if Path("full_type.log").exists() else ""
          codes = []
          for code in re.findall(r"error: .*?\[([^\]]+)\]", log_text):
            if code not in codes:
              codes.append(code)
          files = []
          for file_path in re.findall(r"\b(?:src|tests|docs|\.github)/[\w./-]+\.[A-Za-z0-9]+", log_text):
            if file_path not in files:
              files.append(file_path)

          lines = [
            "# Quality summary (full-type-surface)",
            "",
            "- Failed command: `make qa-full-type`",
            f"- Top error classes: `{', '.join(codes[:5]) if codes else 'none detected'}`",
            f"- First failing files: `{', '.join(files[:5]) if files else 'none detected'}`",
            "",
            "## Local remediation",
            "- `pre-commit run --all-files`",
            "- `mypy --config-file=pyproject.toml src tests`",
            "",
            "## Artifacts",
            "- `full-type-log`",
          ]
          Path("quality-summary.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          cat quality-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload full-type log artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: full-type-log
          path: full_type.log
          if-no-files-found: warn

      - name: Upload full-type quality summary artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-summary-full-type-surface
          path: quality-summary.md
          if-no-files-found: warn

      - name: Final end-of-job failure summary
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import re
          from pathlib import Path

          log_text = Path("full_type.log").read_text(encoding="utf-8", errors="replace") if Path("full_type.log").exists() else ""
          classes = []
          for code in re.findall(r"error: .*?\[([^\]]+)\]", log_text):
            if code not in classes:
              classes.append(code)
          files = []
          for file_path in re.findall(r"\b(?:src|tests|docs|\.github)/[\w./-]+\.[A-Za-z0-9]+", log_text):
            if file_path not in files:
              files.append(file_path)

          failed = "make qa-full-type" if "${{ steps.full_type.outputs.exit_code || '0' }}" != "0" else "none"
          print("\n### End-of-job summary (full-type-surface)")
          print(f"- Failed command(s): `{failed}`")
          print(f"- Top error classes: `{', '.join(classes[:5]) if classes else 'none detected'}`")
          print(f"- First failing files: `{', '.join(files[:5]) if files else 'none detected'}`")
          print("- Quality summary artifact: `quality-summary-full-type-surface`")
          PY

      - name: Fail job on full-type errors
        if: steps.full_type.outcome == 'failure'
        run: exit 1
